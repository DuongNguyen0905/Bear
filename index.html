<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- interactive-widget=overlays-content: bàn phím ảo chỉ đè lên trên, không
         thu hẹp visual viewport nữa — nếu không thì các phần tử position:
         fixed/absolute (thanh menu dưới) sẽ tự "đuổi theo" mép trên bàn phím. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Sổ Tay Của Tớ</title>
  </head>

    <script type="module" src="src/main.tsx"></script>
  </body>
